<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="{{url_for('static', filename='main.css')}}" type="text/css" rel="stylesheet">
    {% if title %}
        <title>My Book Store -{{title}}</title>
    {% else %}
        <title>My Book Store</title>
    {% endif %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo01" aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
        <a class="navbar-brand" href="#">My Store</a>
        <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
          <li class="nav-item active">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/about">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/register">Register</a>
          </li>
        </ul>
        <form class="form-inline my-2 my-lg-0"
          action=""
          method="GET">
          <input class="form-control mr-sm-2"
             type="search"
             name="q"
             placeholder="Search books..."
             aria-label="Search">
          <button class="btn btn-outline-success my-2 my-sm-0"
              type="submit">Search</button>
        </form>
      </div>
    </nav>
   <main role="main" class="container">
      <div class="row">
            <div class="col-md-8">
              {% block body %}{% endblock %}
            </div>
            <div class="col-md-4">
              <div class="content-section">
                <h3>My Store</h3>
                <p class='text-muted'>Quick links
                  <ul class="list-group">
                    <li class="list-group-item list-group-item-light">Latest Arrivals</li>
                    <li class="list-group-item list-group-item-light">Categories</li>
                    <li class="list-group-item list-group-item-light">Best Sellers</li>
                    <li class="list-group-item list-group-item-light">About</li>
                  </ul>
                </p>
              </div>
            </div>
        </div>
      </main>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
